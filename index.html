<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas de numeración</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Sistemas de numeración</h1>
        <p class="desc">
            Un sistema de numeración es un conjunto de símbolos y reglas de generación que permiten construir todos los
            números válidos en el sistema.
        </p>
        <p class="desc">
            Introduzca el número de <strong>Sistema N</strong> que desea convertir en el cuadro de texto, para ver
            los resultados en la tabla.
        </p>

        <div class="converter">
            <input type="text" class="input-number" id="input">

            <select id="from" class="select">
                <option value="decimal">Sistema Decimal</option>
                <option value="binario">Sistema Binario</option>
                <option value="octal">Sistema Octal</option>
                <option value="hexadecimal">Sistema Hexadecimal</option>
            </select>

            <span class="swap">↔</span>

            <select id="to" class="select">
                <option value="hexadecimal">Sistema Hexadecimal</option>
                <option value="decimal">Sistema Decimal</option>
                <option value="binario">Sistema Binario</option>
                <option value="octal">Sistema Octal</option>
            </select>

            <button id="convert">➜</button>
        </div>
    </div>

    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script type="module" src="app.js"></script>

</body>

</html>
